<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#060813" />
  <title>Hitung Mundur Acara AL-FATAH</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap');
    :root { --bg: #060813; }
    body { background-color: var(--bg); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(14, 18, 37, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    
    /* Animasi Background Gradient */
    .bg-gradient-animate {
        background: linear-gradient(-45deg, #4f46e5, #0ea5e9, #3b82f6, #6366f1);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  </style>
</head>
<body class="min-h-screen flex flex-col relative text-slate-300">

  <!-- Efek Cahaya Latar Belakang -->
  <div class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/30 blur-[120px] rounded-full pointer-events-none"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-emerald-600/20 blur-[120px] rounded-full pointer-events-none"></div>

  <main class="flex-1 flex flex-col items-center justify-center p-4 md:p-8 relative z-10 w-full max-w-4xl mx-auto my-8">
      
      <!-- HERO SECTION -->
      <div class="text-center mb-10 md:mb-16 w-full mt-4 md:mt-10">
          <div class="inline-block p-4 rounded-3xl glass shadow-2xl border border-indigo-500/30 mb-6 bg-gradient-animate">
              <i class="fas fa-mosque text-4xl text-white"></i>
          </div>
          <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight uppercase">Reuni Akbar <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">Al-Fatah</span></h1>
          <p class="text-sm md:text-base text-slate-400 max-w-2xl mx-auto leading-relaxed">Persiapkan diri Anda untuk perhelatan akbar reuni silaturahmi kita.</p>
      </div>

      <!-- COUNTDOWN TIMER -->
      <div class="glass p-6 md:p-12 rounded-[3rem] border border-white/10 shadow-2xl mb-12 w-full max-w-3xl">
          <h2 id="countdown-title" class="text-center text-xs md:text-sm font-bold uppercase tracking-widest text-indigo-400 mb-2"><i class="fas fa-hourglass-half mr-2"></i> Menuju Hari-H Acara</h2>
          
          <!-- Elemen teks tanggal acara -->
          <p id="event-date-display" class="text-center text-sm md:text-base font-black text-amber-400 tracking-wide"></p>
          
          <!-- Elemen Info Waktu & Pengisi Acara -->
          <div class="flex flex-col md:flex-row justify-center items-center gap-3 md:gap-6 mt-4 mb-10">
              <div class="flex items-center gap-2 bg-indigo-500/10 px-4 py-2 rounded-xl border border-indigo-500/20">
                  <i class="fas fa-clock text-indigo-400"></i>
                  <span id="event-time-display" class="text-xs font-bold text-indigo-200">Menunggu Info Panitia</span>
              </div>
              <div class="flex items-center gap-2 bg-emerald-500/10 px-4 py-2 rounded-xl border border-emerald-500/20">
                  <i class="fas fa-star text-emerald-400"></i>
                  <span id="event-guest-display" class="text-xs font-bold text-emerald-200">Menunggu Info Panitia</span>
              </div>
          </div>
          
          <div class="flex justify-center gap-3 md:gap-6 text-center">
              <div class="flex flex-col"><div class="w-16 h-16 md:w-24 md:h-24 glass rounded-2xl md:rounded-[2rem] flex items-center justify-center text-2xl md:text-4xl font-black text-white shadow-inner" id="cd-days">00</div><span class="text-[10px] md:text-xs mt-2 font-bold uppercase text-slate-500">Hari</span></div>
              <div class="text-2xl md:text-4xl font-black text-slate-600 mt-3 md:mt-6">:</div>
              <div class="flex flex-col"><div class="w-16 h-16 md:w-24 md:h-24 glass rounded-2xl md:rounded-[2rem] flex items-center justify-center text-2xl md:text-4xl font-black text-white shadow-inner" id="cd-hours">00</div><span class="text-[10px] md:text-xs mt-2 font-bold uppercase text-slate-500">Jam</span></div>
              <div class="text-2xl md:text-4xl font-black text-slate-600 mt-3 md:mt-6">:</div>
              <div class="flex flex-col"><div class="w-16 h-16 md:w-24 md:h-24 glass rounded-2xl md:rounded-[2rem] flex items-center justify-center text-2xl md:text-4xl font-black text-white shadow-inner" id="cd-minutes">00</div><span class="text-[10px] md:text-xs mt-2 font-bold uppercase text-slate-500">Menit</span></div>
              <div class="text-2xl md:text-4xl font-black text-slate-600 mt-3 md:mt-6 hidden md:block">:</div>
              <div class="flex flex-col hidden md:flex"><div class="w-16 h-16 md:w-24 md:h-24 glass rounded-2xl md:rounded-[2rem] flex items-center justify-center text-2xl md:text-4xl font-black text-indigo-400 shadow-inner" id="cd-seconds">00</div><span class="text-[10px] md:text-xs mt-2 font-bold uppercase text-slate-500">Detik</span></div>
          </div>

          <div class="mt-12 flex flex-col sm:flex-row justify-center gap-4">
              <a href="pendaftaran.html" class="bg-gradient-animate hover:shadow-[0_0_40px_rgba(99,102,241,0.5)] text-white py-4 px-8 rounded-[1.5rem] font-black text-sm uppercase tracking-widest transition-all duration-300 transform hover:-translate-y-1 text-center">
                  <i class="fas fa-ticket-alt mr-2"></i> Daftar Sekarang
              </a>
              <a href="Rundown.html" class="glass hover:bg-white/10 text-white py-4 px-8 rounded-[1.5rem] border border-white/10 font-black text-sm uppercase tracking-widest transition-all text-center">
                  <i class="fas fa-list-ol mr-2"></i> Lihat Rundown
              </a>
          </div>
      </div>

  </main>

  <footer class="text-center py-8 text-[10px] font-bold text-slate-600 uppercase tracking-widest relative z-10">
      &copy; Panitia Reuni Akbar Pondok Pesantren Al-Fatah
  </footer>

  <script>
    // ==========================================
    // KONFIGURASI API
    // ==========================================
    
    // GANTI STRING DI BAWAH INI DENGAN URL GOOGLE APPS SCRIPT (API_URL) ANDA!
    const API_URL = "https://script.google.com/macros/s/AKfycbxo19MF5hSTFQgU3SDAxJfWPg3stsC-VIpRcFq659J3BtIEwSJhndR1BPgRM1XNShlr/exec"; 
    
    let timer;

    async function initCountdown() {
        try {
            // Tampilkan status loading pada judul hitung mundur
            document.getElementById("countdown-title").innerHTML = "<i class='fas fa-spinner fa-spin mr-2'></i> Mengambil Data Acara...";
            
            // Cek jika ada URL Parameter (opsional override, misal: ?date=2026-11-20T08:00)
            const urlParams = new URLSearchParams(window.location.search);
            const dateParam = urlParams.get('date');
            
            let eventDateString;
            
            if (dateParam && !isNaN(new Date(dateParam).getTime())) {
                eventDateString = dateParam;
            } else {
                // Tarik data tanggal acara langsung dari Google Apps Script
                const res = await fetch(API_URL + "?action=geteventinfo").then(r => r.json());
                if (res.ok && res.date) {
                    eventDateString = res.date;
                    
                    // Gunakan fallback "Menunggu Info Panitia" jika jam tidak diatur
                    document.getElementById("event-time-display").innerText = res.time || "Menunggu Info Panitia";
                    document.getElementById("event-guest-display").innerText = res.guest || "Menunggu Info Panitia";
                } else {
                    eventDateString = "TBD"; // Fallback default jika gagal
                }
            }

            // Jika status tanggal belum ditentukan (TBD)
            if (eventDateString === "TBD" || !eventDateString) {
                document.getElementById("countdown-title").innerHTML = "<i class='fas fa-clock mr-2'></i> Waktu Acara";
                document.getElementById("event-date-display").innerText = "Menunggu Info Panitia";
                
                // Ubah angka hitung mundur menjadi strip (-)
                document.getElementById("cd-days").innerText = "-";
                document.getElementById("cd-hours").innerText = "-";
                document.getElementById("cd-minutes").innerText = "-";
                if(document.getElementById("cd-seconds")) document.getElementById("cd-seconds").innerText = "-";
                
                return; // Hentikan fungsi di sini, jangan jalankan hitung mundur
            }

            const EVENT_DATE = new Date(eventDateString).getTime();
            document.getElementById("countdown-title").innerHTML = "<i class='fas fa-hourglass-half mr-2'></i> Menuju Hari-H Acara";

            // Format dan tampilkan tanggal acara dalam Bahasa Indonesia HANYA HARI DAN TANGGAL (Tanpa Jam)
            const eventDateObj = new Date(eventDateString);
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const formattedDate = eventDateObj.toLocaleDateString('id-ID', options);
            document.getElementById("event-date-display").innerText = formattedDate;

            // Logika Hitung Mundur (Countdown)
            timer = setInterval(function() {
                const now = new Date().getTime();
                const distance = EVENT_DATE - now;

                if (distance < 0) {
                    clearInterval(timer);
                    document.getElementById("cd-days").innerText = "00";
                    document.getElementById("cd-hours").innerText = "00";
                    document.getElementById("cd-minutes").innerText = "00";
                    if(document.getElementById("cd-seconds")) document.getElementById("cd-seconds").innerText = "00";
                    
                    // Ubah judul jika acara sudah dimulai
                    const titleEl = document.getElementById("countdown-title");
                    if (titleEl) titleEl.innerHTML = "<i class='fas fa-glass-cheers mr-2'></i> Acara Sedang Berlangsung!";
                    document.getElementById("event-date-display").innerText = "Selamat Datang di Reuni Akbar!";
                    
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("cd-days").innerText = days.toString().padStart(2, '0');
                document.getElementById("cd-hours").innerText = hours.toString().padStart(2, '0');
                document.getElementById("cd-minutes").innerText = minutes.toString().padStart(2, '0');
                if(document.getElementById("cd-seconds")) document.getElementById("cd-seconds").innerText = seconds.toString().padStart(2, '0');
            }, 1000);

        } catch (error) {
            console.error("Gagal mengambil tanggal dari GAS:", error);
            document.getElementById("countdown-title").innerHTML = "<i class='fas fa-exclamation-triangle mr-2 text-red-500'></i> Gagal memuat data.";
        }
    }

    // Jalankan hitung mundur
    initCountdown();
  </script>
</body>
</html>

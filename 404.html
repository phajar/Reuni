<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#060813" />
  <title>Halaman Tidak Ditemukan — Reuni Akbar AL-FATAH</title>
  <script src="js/lib/tailwindcss.js"></script>
  <link rel="stylesheet" href="css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800;900&display=swap');
    :root { --bg: #060813; }
    body { background-color: var(--bg); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(14,18,37,0.80); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); }

    /* Floating 404 number animation */
    @keyframes float404 {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-20px) rotate(2deg); }
    }
    .float-404 { animation: float404 4s ease-in-out infinite; }

    /* Glitch text effect */
    @keyframes glitch1 { 0%,100%{clip-path:inset(0 0 90% 0)} 25%{clip-path:inset(30% 0 50% 0)} 50%{clip-path:inset(60% 0 20% 0)} 75%{clip-path:inset(10% 0 70% 0)} }
    @keyframes glitch2 { 0%,100%{clip-path:inset(80% 0 0 0)} 25%{clip-path:inset(20% 0 60% 0)} 50%{clip-path:inset(50% 0 30% 0)} 75%{clip-path:inset(70% 0 10% 0)} }
    .glitch-wrap { position: relative; display: inline-block; }
    .glitch-wrap::before, .glitch-wrap::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      font-size: inherit; font-weight: inherit; color: inherit;
    }
    .glitch-wrap::before {
      color: #f472b6; transform: translateX(-3px);
      animation: glitch1 2.5s infinite linear alternate-reverse;
    }
    .glitch-wrap::after {
      color: #06b6d4; transform: translateX(3px);
      animation: glitch2 2.5s infinite linear alternate-reverse;
    }

    /* Stars */
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
    .star { position:fixed; border-radius:50%; background:white; animation:twinkle var(--d,2s) ease infinite; animation-delay:var(--delay,0s); pointer-events:none; }
  </style>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative p-6">

  <!-- Ambient glow -->
  <div class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 blur-[150px] rounded-full pointer-events-none z-0"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-pink-600/10 blur-[150px] rounded-full pointer-events-none z-0"></div>

  <!-- Stars decoration -->
  <script>
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      const size = Math.random() * 2.5 + 0.5;
      s.className = 'star';
      s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*3}s;--delay:${Math.random()*3}s;opacity:${Math.random()*0.5+0.1};`;
      document.body.appendChild(s);
    }
  </script>

  <!-- Content -->
  <div class="relative z-10 text-center max-w-lg w-full">

    <!-- 404 Number -->
    <div class="float-404 mb-6 select-none">
      <div class="glitch-wrap text-[120px] md:text-[160px] font-black leading-none text-transparent bg-clip-text bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400" data-text="404">
        404
      </div>
    </div>

    <!-- Card -->
    <div class="glass rounded-[2.5rem] p-8 md:p-10 border border-white/10 shadow-2xl">
      <!-- Icon -->
      <div class="w-16 h-16 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-5">
        <i class="fas fa-compass text-2xl text-indigo-400"></i>
      </div>

      <h1 class="text-2xl md:text-3xl font-black text-white uppercase tracking-tight mb-3">
        Halaman Tidak <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">Ditemukan</span>
      </h1>
      <p class="text-slate-400 text-sm leading-relaxed mb-8">
        Maaf, halaman yang Anda cari tidak ada atau mungkin sudah dipindahkan.<br>
        Silakan kembali ke halaman utama.
      </p>

      <!-- Action buttons -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="portal.html" id="btn-back-home" class="inline-flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all hover:scale-105 shadow-lg shadow-indigo-500/30">
          <i class="fas fa-home"></i> Kembali ke Beranda
        </a>
        <a href="pendaftaran.html" class="inline-flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-slate-300 hover:text-white px-6 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest transition-all border border-white/10">
          <i class="fas fa-user-plus"></i> Daftar Reuni
        </a>
      </div>

      <!-- Quick links -->
      <div class="mt-8 pt-6 border-t border-white/10">
        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Halaman Lainnya</p>
        <div class="flex flex-wrap justify-center gap-3">
          <a href="cek-status.html" class="text-xs text-amber-400 hover:text-amber-300 font-bold transition-colors flex items-center gap-1.5 glass px-3 py-1.5 rounded-full border border-amber-500/20">
            <i class="fas fa-search text-[10px]"></i>Cek Status
          </a>
          <a href="pembayaran.html" class="text-xs text-emerald-400 hover:text-emerald-300 font-bold transition-colors flex items-center gap-1.5 glass px-3 py-1.5 rounded-full border border-emerald-500/20">
            <i class="fas fa-hand-holding-heart text-[10px]"></i>Donasi
          </a>
          <a href="Rundown.html" class="text-xs text-purple-400 hover:text-purple-300 font-bold transition-colors flex items-center gap-1.5 glass px-3 py-1.5 rounded-full border border-purple-500/20">
            <i class="fas fa-list-ol text-[10px]"></i>Jadwal
          </a>
          <a href="login.html" class="text-xs text-slate-400 hover:text-slate-300 font-bold transition-colors flex items-center gap-1.5 glass px-3 py-1.5 rounded-full border border-white/10">
            <i class="fas fa-user-shield text-[10px]"></i>Admin
          </a>
        </div>
      </div>
    </div>

    <p class="text-slate-600 text-xs mt-6 font-bold uppercase tracking-widest">
      &copy; Panitia Reuni Akbar Pondok Pesantren Al-Fatah
    </p>
  </div>

  <script src="js/transitions.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCfZ9zV6DOuSZoFoFvkW8NCSaxNlmn8R8k",
      authDomain: "reuniakbar.firebaseapp.com",
      projectId: "reuniakbar",
      storageBucket: "reuniakbar.firebasestorage.app",
      messagingSenderId: "542951643652",
      appId: "1:542951643652:web:1b4b7dac6c676a5d6c3351"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        const btn = document.getElementById('btn-back-home');
        if (btn) {
          btn.href = 'index.html';
          btn.innerHTML = '<i class="fas fa-tachometer-alt mr-2"></i>Dashboard Panitia';
        }
      }
    });
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('[PWA] Registered:', reg.scope))
          .catch((err) => console.error('[PWA] Failed:', err));
      });
    }
  </script>
</body>
</html>
